<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Flashcards</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-left">
      <h1 id="i18n-app-title">Flashcards App</h1>
    </div>

    <!-- Theme Color Picker Circles -->
    <div class="theme-picker">
      <button class="theme-circle theme-mint" data-theme="mint" title="Mint Green"></button>
      <button class="theme-circle theme-blue" data-theme="blue" title="Dark Blue"></button>
      <button class="theme-circle theme-purple active" data-theme="purple" title="Purple"></button>
    </div>

    <button id="menu-toggle-btn" class="menu-toggle-btn" aria-label="Toggle Navigation">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

    <div id="header-right" class="header-right">
      <button id="sync-gist-btn" class="btn icon-btn" title="GitHub Gist Sync"><span class="btn-text">Sync</span></button>
      <button id="export-import-btn" class="btn icon-btn" title="Export / Import"><span class="btn-text">Export/Import</span></button>
      <button id="study-mode-btn" class="btn secondary"><span id="i18n-study-btn">Flashcards</span></button>

      <div class="lang-selector">
        <select id="lang-select">
          <option value="en">English</option>
          <option value="ru">Русский</option>
          <option value="cs">Čeština</option>
          <option value="es">Español</option>
          <option value="tr">Türkçe</option>
        </select>
      </div>
    </div>
  </header>

  <main class="container">
    <aside class="sidebar">
      <h2 id="i18n-folders">Folders</h2>
      <div class="folder-controls">
        <input type="text" id="new-folder-input" placeholder="New folder...">
        <button id="add-folder-btn">+</button>
      </div>
      
      <ul id="folders-list"></ul>
      
      <button id="toggle-folders-btn" class="toggle-folders-btn hidden">
        <span id="toggle-folders-text">More folders</span>
        <span class="arrow-icon">▼</span>
      </button>
    </aside>

    <section class="content">
      <div class="actions">
        <button id="open-modal-btn" class="btn primary">+ Create card</button>
      </div>

      <h2 id="current-folder-title">All Flashcards</h2>

      <div id="cards-grid" class="cards-grid"></div>
    </section>
  </main>

  <!-- Create / Edit card modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <span id="close-modal-btn" class="close">&times;</span>
      <h2 id="modal-title">New Flashcard</h2>
      <form id="card-form">
        <input type="hidden" id="card-id-input">

        <label for="word-input" id="i18n-lbl-word">Word / Phrase:</label>
        <input type="text" id="word-input" required placeholder="Apple">

        <label for="tag-input" id="i18n-lbl-tag">Part of Speech / Tag:</label>
        <input type="text" id="tag-input" list="tag-suggestions" placeholder="e.g. noun, verb, phrasal verb...">
        <datalist id="tag-suggestions">
          <option value="noun">
          <option value="verb">
          <option value="adjective">
          <option value="adverb">
          <option value="phrasal verb">
          <option value="phrasal word">
          <option value="idiom">
          <option value="modal verb">
          <option value="preposition">
          <option value="conjunction">
          <option value="interjection">
        </datalist>

        <label for="translation-input" id="i18n-lbl-translation">Translation:</label>
        <input type="text" id="translation-input" placeholder="A round fruit">

        <label for="definition-input" id="i18n-lbl-definition">Definition / Context:</label>
        <textarea id="definition-input" placeholder="Context sentence..."></textarea>

        <label for="folder-select" id="i18n-lbl-folder">Select folder:</label>
        <select id="folder-select"></select>

        <label id="i18n-lbl-image">Image:</label>
        <div class="image-source-options">
          <label><input type="radio" name="image-source" value="file" checked> <span id="i18n-opt-file">From computer</span></label>
          <label><input type="radio" name="image-source" value="url"> <span id="i18n-opt-url">Via URL link</span></label>
        </div>

        <input type="file" id="image-input" accept="image/*">
        <input type="url" id="image-url-input" class="hidden" placeholder="https://example.com/image.jpg">

        <div id="image-preview-container" class="hidden">
          <img id="image-preview" src="" alt="Preview">
          <button type="button" id="remove-image-btn" class="btn-danger-sm">Remove image</button>
        </div>

        <button type="submit" id="save-card-btn" class="btn primary">Save Flashcard</button>
      </form>
    </div>
  </div>

  <!-- Export / Import modal -->
  <div id="io-modal" class="modal hidden">
    <div class="modal-content io-modal-content">
      <span id="close-io-btn" class="close">&times;</span>
      <h2 id="i18n-io-title" style="margin-bottom: 0.8rem;">Export / Import</h2>

      <div class="io-card">
        <h3 id="i18n-export-title">Export</h3>
        <div class="form-group">
          <label for="export-folder-select" id="i18n-export-lbl">Select folder to export:</label>
          <select id="export-folder-select"></select>
        </div>
        <button id="do-export-btn" class="btn primary" style="width: 100%; margin-top: 0.5rem;">Download JSON</button>
      </div>

      <div class="io-card" style="margin-top: 0.8rem;">
        <h3 id="i18n-import-title">Import</h3>
        <div class="form-group">
          <label id="i18n-import-lbl">Select .json file:</label>
          <input type="file" id="import-file-input" accept=".json">
        </div>
        <button id="do-import-btn" class="btn primary" style="width: 100%; margin-top: 0.5rem;">Upload data</button>
      </div>
    </div>
  </div>

  <!-- GitHub Gist sync modal -->
  <div id="gist-modal" class="modal hidden">
    <div class="modal-content">
      <span id="close-gist-btn" class="close">&times;</span>
      <h2>GitHub Gist Sync</h2>
      <p class="gist-desc">Sync your flashcards with GitHub Gist to access them across your devices.</p>
      
      <div class="form-group">
        <label for="gist-token-input">GitHub Access Token:</label>
        <input type="password" id="gist-token-input" placeholder="ghp_xxxxxxxxxxxx">
      </div>

      <div class="form-group">
        <label for="gist-id-input">Gist ID (optional):</label>
        <input type="text" id="gist-id-input" placeholder="4b3f8a...">
      </div>

      <div class="gist-actions">
        <button id="gist-push-btn" class="btn primary">Upload (Push)</button>
        <button id="gist-pull-btn" class="btn secondary">Download (Pull)</button>
      </div>
    </div>
  </div>

  <!-- Study setup modal -->
  <div id="study-setup-modal" class="modal hidden">
    <div class="modal-content">
      <span id="close-study-setup-btn" class="close">&times;</span>
      <h2 id="i18n-study-setup-title">Study Setup</h2>

      <div class="form-group">
        <label for="study-folder-select" id="i18n-study-lbl-folder">Select folder:</label>
        <select id="study-folder-select"></select>
      </div>

      <div class="form-group">
        <label id="i18n-study-lbl-mode" style="margin-bottom: 0.3rem;">Flashcard Mode:</label>
        <div class="radio-group-vertical">
          <label class="mode-radio-card">
            <input type="radio" name="study-mode-type" value="translation" checked> 
            <span id="i18n-mode-trans">Word &rarr; Translation</span>
          </label>
          <label class="mode-radio-card">
            <input type="radio" name="study-mode-type" value="definition"> 
            <span id="i18n-mode-def">Meaning &rarr; Word</span>
          </label>
          <label class="mode-radio-card">
            <input type="radio" name="study-mode-type" value="image"> 
            <span id="i18n-mode-img">Photo &rarr; Word</span>
          </label>
        </div>
      </div>

      <button id="start-study-btn" class="btn primary" style="width: 100%; margin-top: 1rem;">OK</button>
    </div>
  </div>

  <!-- Interactive study viewer -->
  <div id="study-viewer-modal" class="modal hidden">
    <div class="modal-content study-viewer-content">
      <span id="close-study-viewer-btn" class="close">&times;</span>

      <div class="study-progress" id="study-progress-text">1 / 10</div>

      <div class="flashcard-3d" id="flashcard-3d">
        <div class="flashcard-inner">
          <div class="flashcard-front">
            <div class="flashcard-text" id="flashcard-front-text">---</div>
          </div>
          <div class="flashcard-back">
            <div class="flashcard-text" id="flashcard-back-text">---</div>
          </div>
        </div>
      </div>

      <div class="study-nav">
        <button id="prev-card-btn" class="btn secondary">&larr;</button>
        <button id="next-card-btn" class="btn secondary">&rarr;</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
