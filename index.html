<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal Flashcards</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1 id="i18n-app-title">Flashcards App</h1>
    <div class="lang-selector">
      <label for="lang-select"></label>
      <select id="lang-select">
        <option value="en">English</option>
        <option value="ru">Русский</option>
        <option value="cs">Čeština</option>
        <option value="es">Español</option>
      </select>
    </div>
  </header>

  <main class="container">
    <!-- Боковая панель с папками -->
    <aside class="sidebar">
      <h2 id="i18n-folders">Папки</h2>
      <div class="folder-controls">
        <input type="text" id="new-folder-input" placeholder="Новая папка...">
        <button id="add-folder-btn">+</button>
      </div>
      <ul id="folders-list">
        <!-- Папки будут рендериться здесь -->
      </ul>
    </aside>

    <!-- Основной контент -->
    <section class="content">
      <!-- Панель управления -->
      <div class="actions">
        <button id="open-modal-btn" class="btn primary">+ Создать карточку</button>
      </div>

      <!-- Заголовок активной папки -->
      <h2 id="current-folder-title">Все карточки</h2>

      <!-- Сетка карточек -->
      <div id="cards-grid" class="cards-grid">
        <!-- Карточки будут рендериться здесь -->
      </div>
    </section>
  </main>

  <!-- Модальное окно создания / редактирования карточки -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <span id="close-modal-btn" class="close">&times;</span>
      <h2 id="modal-title">Новая карточка</h2>
      <form id="card-form">
        <!-- Скрытое поле для ID карточки -->
        <input type="hidden" id="card-id-input">

        <label for="word-input" id="i18n-lbl-word">Слово / Фраза:</label>
        <input type="text" id="word-input" required placeholder="Apple">

        <label for="translation-input" id="i18n-lbl-translation">Перевод:</label>
        <input type="text" id="translation-input" required placeholder="Яблоко">

        <label for="definition-input" id="i18n-lbl-definition">Определение / Контекст (необязательно):</label>
        <textarea id="definition-input" placeholder="A round fruit with red or green skin..."></textarea>

        <label for="folder-select" id="i18n-lbl-folder">Выберите папку:</label>
        <select id="folder-select">
          <!-- Опции подгрузятся динамически -->
        </select>

        <label for="image-input" id="i18n-lbl-image">Изображение (необязательно):</label>
        <input type="file" id="image-input" accept="image/*">

        <!-- Превью изображения при редактировании -->
        <div id="image-preview-container" class="hidden">
          <img id="image-preview" src="" alt="Preview">
          <button type="button" id="remove-image-btn" class="btn-danger-sm">Удалить картинку</button>
        </div>

        <button type="submit" id="save-card-btn" class="btn primary">Сохранить карточку</button>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
