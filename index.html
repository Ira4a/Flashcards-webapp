<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal Flashcards</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1 data-i18n="appTitle">🎴 Flashcards App</h1>
    <div class="lang-selector">
      <label for="lang-select">🌐</label>
      <select id="lang-select">
        <option value="en">English</option>
        <option value="ru">Русский</option>
        <option value="cs">Čeština</option>
        <option value="es">Español</option>
      </select>
    </div>
  </header>

  <main class="container">
    <!-- Боковая панель с папками -->
    <aside class="sidebar">
      <h2 data-i18n="folders">Папки</h2>
      <div class="folder-controls">
        <input type="text" id="new-folder-input" placeholder="Новая папка..." data-i18n-ph="newFolderPh">
        <button id="add-folder-btn">+</button>
      </div>
      <ul id="folders-list">
        <!-- Папки будут рендериться здесь -->
      </ul>
    </aside>

    <!-- Основной контент -->
    <section class="content">
      <!-- Панель управления -->
      <div class="actions">
        <button id="open-modal-btn" class="btn primary" data-i18n="createCard">+ Создать карточку</button>
      </div>

      <!-- Заголовок активной папки -->
      <h2 id="current-folder-title">Все карточки</h2>

      <!-- Сетка карточек -->
      <div id="cards-grid" class="cards-grid">
        <!-- Карточки будут рендериться здесь -->
      </div>
    </section>
  </main>

  <!-- Модальное окно создания / редактирования карточки -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <span id="close-modal-btn" class="close">&times;</span>
      <h2 id="modal-title" data-i18n="modalTitleNew">Новая карточка</h2>
      <form id="card-form">
        <!-- Скрытое поле для хранения ID при редактировании -->
        <input type="hidden" id="card-id-input">

        <label for="word-input" data-i18n="lblWord">Слово / Фраза:</label>
        <input type="text" id="word-input" required placeholder="Apple" data-i18n-ph="phWord">

        <label for="translation-input" data-i18n="lblTranslation">Перевод:</label>
        <input type="text" id="translation-input" required placeholder="Яблоко" data-i18n-ph="phTranslation">

        <label for="definition-input" data-i18n="lblDefinition">Определение / Контекст (необязательно):</label>
        <textarea id="definition-input" placeholder="A round fruit with red or green skin..." data-i18n-ph="phDefinition"></textarea>

        <label for="folder-select" data-i18n="lblSelectFolder">Выберите папку:</label>
        <select id="folder-select">
          <!-- Опции подгрузятся динамически -->
        </select>

        <label for="image-input" data-i18n="lblImage">Изображение (необязательно):</label>
        <input type="file" id="image-input" accept="image/*">

        <!-- Превью существующего изображения при редактировании -->
        <div id="image-preview-container" class="hidden">
          <img id="image-preview" src="" alt="Preview">
          <button type="button" id="remove-image-btn" class="btn-danger-sm" data-i18n="removeImage">Удалить картинку</button>
        </div>

        <button type="submit" id="save-card-btn" class="btn primary" data-i18n="btnSave">Сохранить карточку</button>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
